# ═══════════════════════════════════════════════════════════════════════
# JARVIS APK — GitHub Actions CI/CD Pipeline
#
# This workflow builds the JARVIS APK with Rust JNI libraries
# included (not stubs). The build order is critical:
#
#   1. Setup JDK 17 + Android SDK
#   2. Install Android NDK (required by cargo-ndk)
#   3. Setup Rust toolchain + cargo-ndk
#   4. Add Rust Android cross-compilation targets
#   5. Build libjarvis_rust.so for arm64-v8a + armeabi-v7a
#   6. Run ./gradlew assembleRelease (which also triggers CMake)
#   7. Verify APK contains .so files (not just stubs)
#   8. Upload APK as downloadable artifact
#
# The release APK is signed with the debug keystore by default.
# For production, add your own signing config.
# ═══════════════════════════════════════════════════════════════════════

name: Build JARVIS APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── Step 1: Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Setup JDK 17 ──────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Step 3: Setup Android SDK ─────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Step 4: Install Android NDK ───────────────────────────────
      # cargo-ndk requires NDK to cross-compile Rust for Android.
      # We pin NDK 27.2.12479018 for reproducibility.
      - name: Install Android NDK
        run: |
          echo "Installing Android NDK..."
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "NDK installed at: $ANDROID_HOME/ndk/27.2.12479018"

      # ── Step 5: Install Rust toolchain ────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # ── Step 6: Install cargo-ndk ─────────────────────────────────
      # cargo-ndk is the bridge between Cargo and the Android NDK.
      # It handles cross-compilation for all Android ABIs.
      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      # ── Step 7: Add Rust Android targets ──────────────────────────
      # These are the target triples that Rust uses for Android:
      #   aarch64-linux-android → arm64-v8a (modern phones)
      #   armv7-linux-androideabi → armeabi-v7a (older phones)
      #   x86_64-linux-android → x86_64 (emulators)
      #   i686-linux-android → x86 (older emulators)
      - name: Add Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android
          rustup target add i686-linux-android

      # ── Step 8: Cache Gradle ──────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-

      # ── Step 9: Cache Rust ────────────────────────────────────────
      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: |
            rust/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-${{ hashFiles('rust/Cargo.toml', 'rust/src/**') }}
          restore-keys: rust-

      # ── Step 10: Create jniLibs directories ───────────────────────
      - name: Create jniLibs directories
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64
          mkdir -p app/src/main/jniLibs/x86

      # ── Step 11: Build Rust native library (arm64-v8a) ────────────
      # This is the PRIMARY target — all modern Android phones use arm64.
      - name: Build Rust native library (arm64-v8a)
        run: |
          cd rust
          cargo ndk -t aarch64-linux-android -o ../app/src/main/jniLibs --platform 26 build --release
          echo "arm64-v8a .so size:"
          ls -lh ../app/src/main/jniLibs/arm64-v8a/libjarvis_rust.so || echo "NOT FOUND"

      # ── Step 12: Build Rust native library (armeabi-v7a) ──────────
      # For older 32-bit ARM devices.
      - name: Build Rust native library (armeabi-v7a)
        run: |
          cd rust
          cargo ndk -t armv7-linux-androideabi -o ../app/src/main/jniLibs --platform 26 build --release
          echo "armeabi-v7a .so size:"
          ls -lh ../app/src/main/jniLibs/armeabi-v7a/libjarvis_rust.so || echo "NOT FOUND"

      # ── Step 13: Build Rust native library (x86_64) ───────────────
      # For emulators and Chromebooks.
      - name: Build Rust native library (x86_64)
        run: |
          cd rust
          cargo ndk -t x86_64-linux-android -o ../app/src/main/jniLibs --platform 26 build --release
          echo "x86_64 .so size:"
          ls -lh ../app/src/main/jniLibs/x86_64/libjarvis_rust.so || echo "NOT FOUND"

      # ── Step 14: Build Rust native library (x86) ──────────────────
      # For older emulators.
      - name: Build Rust native library (x86)
        run: |
          cd rust
          cargo ndk -t i686-linux-android -o ../app/src/main/jniLibs --platform 26 build --release
          echo "x86 .so size:"
          ls -lh ../app/src/main/jniLibs/x86/libjarvis_rust.so || echo "NOT FOUND"

      # ── Step 15: Verify Rust .so files ────────────────────────────
      # CRITICAL: This step catches the "50% APK size drop" bug.
      # If no .so files were built, the CMake stub will be used instead,
      # which means the Rust backend is non-functional.
      - name: Verify Rust .so files
        run: |
          echo "=== Rust JNI Libraries ==="
          find app/src/main/jniLibs -name "*.so" -exec ls -lh {} \;
          SO_COUNT=$(find app/src/main/jniLibs -name "libjarvis_rust.so" | wc -l)
          echo "Total libjarvis_rust.so files: $SO_COUNT"
          if [ "$SO_COUNT" -lt 2 ]; then
            echo "❌ CRITICAL: Less than 2 ABI .so files built!"
            echo "The APK will ship with JNI stubs instead of real Rust backend."
            echo "This means: no Gemini AI, no TTS, no wake word detection."
            exit 1
          else
            echo "✅ At least 2 ABI .so files found — Rust backend will be functional"
          fi

      # ── Step 16: Grant execute permission for gradlew ─────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Step 17: Build Release APK ────────────────────────────────
      # Release is built FIRST (primary deliverable).
      # The Rust .so files are already in jniLibs/ from the previous steps,
      # so Gradle will package them into the APK.
      - name: Build Release APK
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      # ── Step 18: Verify Release APK ───────────────────────────────
      # Checks APK size and verifies it contains native libraries.
      - name: Verify Release APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
            APK_BYTES=$(stat -c%s "$APK_PATH" 2>/dev/null || stat -f%z "$APK_PATH" 2>/dev/null)
            echo "APK: $APK_PATH"
            echo "APK Size: $APK_SIZE"
            echo "APK Bytes: $APK_BYTES"

            # Check if APK contains the Rust .so (not just the CMake stub)
            if unzip -l "$APK_PATH" | grep -q "libjarvis_rust.so"; then
              echo "✅ APK contains libjarvis_rust.so — Rust backend is included!"
              unzip -l "$APK_PATH" | grep "libjarvis_rust.so"
            else
              echo "⚠️ APK does NOT contain libjarvis_rust.so — Rust backend is MISSING!"
              echo "The APK will run in fallback mode with JNI stubs only."
            fi

            # Check if APK is at least 10MB (a reasonable minimum with Rust .so)
            if [ "$APK_BYTES" -lt 10485760 ]; then
              echo "⚠️ WARNING: APK is less than 10MB ($APK_SIZE). This may indicate missing native libraries."
            else
              echo "✅ APK is at least 10MB — likely contains native libraries"
            fi
          else
            echo "❌ ERROR: No Release APK found!"
            exit 1
          fi

      # ── Step 19: Upload Release APK ───────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── Step 20: Build Debug APK (optional) ───────────────────────
      - name: Build Debug APK
        if: always()  # Build debug even if release had issues
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee -a build.log
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      # ── Step 21: Upload Debug APK ─────────────────────────────────
      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── Step 22: Build summary ────────────────────────────────────
      - name: Build Summary
        if: always()
        run: |
          echo "══════════════════════════════════════════════════"
          echo "JARVIS APK Build Summary"
          echo "══════════════════════════════════════════════════"
          echo ""
          echo "Rust .so files:"
          find app/src/main/jniLibs -name "*.so" -exec ls -lh {} \; 2>/dev/null || echo "  None found"
          echo ""
          echo "Release APK:"
          find app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "  Not built"
          echo ""
          echo "Debug APK:"
          find app/build/outputs/apk/debug -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "  Not built"
          echo ""
          echo "══════════════════════════════════════════════════"
