# ═══════════════════════════════════════════════════════════════════════
# JARVIS APK — GitHub Actions CI/CD Pipeline
#
# Build the JARVIS APK with Rust JNI libraries included.
# The build order is critical:
#   1. Setup JDK 17 + Android SDK
#   2. Install Android NDK (required by cargo-ndk)
#   3. Setup Rust toolchain + cargo-ndk
#   4. Add Rust Android cross-compilation targets
#   5. Build libjarvis_rust.so for arm64-v8a + armeabi-v7a
#   6. Run ./gradlew assembleRelease (which also triggers CMake)
#   7. Verify APK contains .so files
#   8. Upload APK as downloadable artifact
# ═══════════════════════════════════════════════════════════════════════

name: Build JARVIS APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── Step 1: Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Setup JDK 17 ──────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Step 3: Setup Android SDK ─────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Step 4: Install Android NDK ───────────────────────────────
      - name: Install Android NDK
        run: |
          echo "Installing Android NDK..."
          # Install the latest available NDK version
          sdkmanager --install "ndk;27.0.12077973" || sdkmanager --install "ndk;26.1.10909125" || true
          # Find whichever NDK was installed
          NDK_PATH=$(ls -d ${ANDROID_HOME}/ndk/*/ 2>/dev/null | head -1)
          if [ -z "$NDK_PATH" ]; then
            echo "Trying ndk-bundle..."
            sdkmanager --install "ndk-bundle" || true
            NDK_PATH="${ANDROID_HOME}/ndk-bundle"
          fi
          echo "NDK installed at: $NDK_PATH"
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV

      # ── Step 5: Install Rust toolchain ────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # ── Step 6: Install cargo-ndk ─────────────────────────────────
      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      # ── Step 7: Add Rust Android targets ──────────────────────────
      # Only arm64-v8a and armeabi-v7a — matches build.gradle.kts abiFilters
      - name: Add Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi

      # ── Step 8: Cache Gradle ──────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-

      # ── Step 9: Cache Rust ────────────────────────────────────────
      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: |
            rust/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-${{ hashFiles('rust/Cargo.toml', 'rust/src/**') }}
          restore-keys: rust-

      # ── Step 10: Create jniLibs directories ───────────────────────
      - name: Create jniLibs directories
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a

      # ── Step 11: Build Rust native library (arm64-v8a) ────────────
      - name: Build Rust native library (arm64-v8a)
        run: |
          cd rust
          cargo ndk -t aarch64-linux-android -o ../app/src/main/jniLibs --platform 26 build --release
          echo "arm64-v8a .so size:"
          ls -lh ../app/src/main/jniLibs/arm64-v8a/libjarvis_rust.so || echo "NOT FOUND"

      # ── Step 12: Build Rust native library (armeabi-v7a) ──────────
      - name: Build Rust native library (armeabi-v7a)
        run: |
          cd rust
          cargo ndk -t armv7-linux-androideabi -o ../app/src/main/jniLibs --platform 26 build --release
          echo "armeabi-v7a .so size:"
          ls -lh ../app/src/main/jniLibs/armeabi-v7a/libjarvis_rust.so || echo "NOT FOUND"

      # ── Step 13: Verify Rust .so files ────────────────────────────
      - name: Verify Rust .so files
        run: |
          echo "=== Rust JNI Libraries ==="
          find app/src/main/jniLibs -name "*.so" -exec ls -lh {} \;
          SO_COUNT=$(find app/src/main/jniLibs -name "libjarvis_rust.so" | wc -l)
          echo "Total libjarvis_rust.so files: $SO_COUNT"
          if [ "$SO_COUNT" -lt 2 ]; then
            echo "CRITICAL: Less than 2 ABI .so files built!"
            exit 1
          else
            echo "At least 2 ABI .so files found — Rust backend will be functional"
          fi

      # ── Step 14: Grant execute permission for gradlew ─────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Step 15: Build Release APK ────────────────────────────────
      - name: Build Release APK
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      # ── Step 16: Verify Release APK ───────────────────────────────
      - name: Verify Release APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
            APK_BYTES=$(stat -c%s "$APK_PATH" 2>/dev/null || stat -f%z "$APK_PATH" 2>/dev/null)
            echo "APK: $APK_PATH"
            echo "APK Size: $APK_SIZE"
            echo "APK Bytes: $APK_BYTES"

            # Check if APK contains the Rust .so
            if unzip -l "$APK_PATH" | grep -q "libjarvis_rust.so"; then
              echo "APK contains libjarvis_rust.so — Rust backend is included!"
              unzip -l "$APK_PATH" | grep "libjarvis_rust.so"
            else
              echo "WARNING: APK does NOT contain libjarvis_rust.so"
            fi
          else
            echo "ERROR: No Release APK found!"
            exit 1
          fi

      # ── Step 17: Upload Release APK ───────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── Step 18: Build Debug APK (optional) ───────────────────────
      - name: Build Debug APK
        if: always()
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee -a build.log
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      # ── Step 19: Upload Debug APK ─────────────────────────────────
      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── Step 20: Build summary ────────────────────────────────────
      - name: Build Summary
        if: always()
        run: |
          echo "══════════════════════════════════════════════════"
          echo "JARVIS APK Build Summary"
          echo "══════════════════════════════════════════════════"
          echo ""
          echo "Rust .so files:"
          find app/src/main/jniLibs -name "*.so" -exec ls -lh {} \; 2>/dev/null || echo "  None found"
          echo ""
          echo "Release APK:"
          find app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "  Not built"
          echo ""
          echo "Debug APK:"
          find app/build/outputs/apk/debug -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "  Not built"
          echo ""
          echo "══════════════════════════════════════════════════"
