name: Build JARVIS APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK & CMake
      run: |
        echo "Installing Android NDK and CMake via sdkmanager..."
        sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
        echo "NDK installed at: $ANDROID_HOME/ndk/27.0.12077973"

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: |
        set +e
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/debug-build.log
        BUILD_EXIT_CODE=${PIPESTATUS[0]}
        echo "=== BUILD EXIT CODE: $BUILD_EXIT_CODE ==="
        if [ $BUILD_EXIT_CODE -ne 0 ]; then
          echo "=== KOTLIN COMPILATION ERRORS ==="
          grep -E "^e:|error:|Unresolved|Cannot find|Type mismatch|No value passed|Too many arguments|Overload resolution" /tmp/debug-build.log || echo "No specific errors found in grep, check full log above"
        fi
        exit $BUILD_EXIT_CODE
      env:
        ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

    - name: Build Release APK
      run: |
        set +e
        ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/release-build.log
        BUILD_EXIT_CODE=${PIPESTATUS[0]}
        echo "=== BUILD EXIT CODE: $BUILD_EXIT_CODE ==="
        if [ $BUILD_EXIT_CODE -ne 0 ]; then
          echo "=== KOTLIN COMPILATION ERRORS ==="
          grep -E "^e:|error:|Unresolved|Cannot find|Type mismatch|No value passed|Too many arguments|Overload resolution" /tmp/release-build.log || echo "No specific errors found in grep, check full log above"
        fi
        exit $BUILD_EXIT_CODE
      env:
        ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        RELEASE_KEYSTORE_PATH: ${{ secrets.RELEASE_KEYSTORE_PATH }}
        RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: jarvis-debug-apk
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: jarvis-release-apk
        path: app/build/outputs/apk/release/*.apk

    - name: Build Summary
      if: always()
      run: |
        echo "## Build Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if ls app/build/outputs/apk/debug/*.apk 1> /dev/null 2>&1; then
          echo "- Debug APK: Built successfully" >> $GITHUB_STEP_SUMMARY
          ls -lh app/build/outputs/apk/debug/*.apk >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
        else
          echo "- Debug APK: Build FAILED" >> $GITHUB_STEP_SUMMARY
        fi
        if ls app/build/outputs/apk/release/*.apk 1> /dev/null 2>&1; then
          echo "- Release APK: Built successfully" >> $GITHUB_STEP_SUMMARY
          ls -lh app/build/outputs/apk/release/*.apk >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
        else
          echo "- Release APK: Build FAILED (may need signing config)" >> $GITHUB_STEP_SUMMARY
        fi
