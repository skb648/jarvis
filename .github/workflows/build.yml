# ═══════════════════════════════════════════════════════════════════════
# JARVIS APK — GitHub Actions CI/CD Pipeline (v7)
#
# Build the JARVIS APK with Rust JNI libraries included.
# The build order is critical:
#   1. Setup JDK 17 + Android SDK
#   2. Install Android NDK (required by cargo-ndk)
#   3. Setup Rust toolchain + cargo-ndk
#   4. Add Rust Android cross-compilation targets
#   5. Build libjarvis_rust.so for arm64-v8a + armeabi-v7a
#   6. Run ./gradlew assembleRelease (which also triggers CMake)
#   7. Verify APK contains .so files
#   8. Upload APK as downloadable artifact
#
# v7 fixes:
#   - Use specific NDK version that matches CMake compatibility
#   - Add CMake installation step
#   - Better error handling and artifact verification
#   - Properly pass NDK_HOME env to Gradle
# ═══════════════════════════════════════════════════════════════════════

name: Build JARVIS APK

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── Step 1: Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Setup JDK 17 ──────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Step 3: Setup Android SDK + NDK ───────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and CMake
        run: |
          echo "Installing Android NDK 27 and CMake..."
          sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK installed at: $ANDROID_HOME/ndk/27.0.12077973"
          ls -la "$ANDROID_HOME/ndk/27.0.12077973/" || echo "NDK dir not found!"

      # ── Step 4: Cache Gradle ──────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── Step 5: Cache Rust ────────────────────────────────────────
      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            rust/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-${{ hashFiles('rust/Cargo.toml', 'rust/Cargo.lock', 'rust/src/**') }}
          restore-keys: rust-

      # ── Step 6: Install Rust toolchain ────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      # ── Step 7: Create jniLibs directories ───────────────────────
      - name: Create jniLibs directories
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a

      # ── Step 8: Build Rust native library ─────────────────────────
      - name: Build Rust native library (arm64-v8a)
        run: |
          cd rust
          cargo ndk -t aarch64-linux-android -o ../app/src/main/jniLibs --platform 26 build --release
          echo "arm64-v8a .so size:"
          ls -lh ../app/src/main/jniLibs/arm64-v8a/libjarvis_rust.so || echo "NOT FOUND - will use CMake stub"

      - name: Build Rust native library (armeabi-v7a)
        run: |
          cd rust
          cargo ndk -t armv7-linux-androideabi -o ../app/src/main/jniLibs --platform 26 build --release
          echo "armeabi-v7a .so size:"
          ls -lh ../app/src/main/jniLibs/armeabi-v7a/libjarvis_rust.so || echo "NOT FOUND - will use CMake stub"

      # ── Step 9: Verify Rust .so files ────────────────────────────
      - name: Verify Rust .so files
        run: |
          echo "=== Rust JNI Libraries ==="
          find app/src/main/jniLibs -name "*.so" -exec ls -lh {} \; 2>/dev/null || echo "No .so files found"
          SO_COUNT=$(find app/src/main/jniLibs -name "libjarvis_rust.so" 2>/dev/null | wc -l)
          echo "Total libjarvis_rust.so files: $SO_COUNT"
          if [ "$SO_COUNT" -lt 2 ]; then
            echo "WARNING: Less than 2 ABI .so files — Rust backend may not be fully functional"
            echo "APK will still build with CMake stub as fallback"
          else
            echo "Both ABI .so files present — Rust backend will be fully functional"
          fi

      # ── Step 10: Grant execute permission for gradlew ─────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Step 11: Build Release APK ────────────────────────────────
      - name: Build Release APK
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      # ── Step 12: Verify Release APK ───────────────────────────────
      - name: Verify Release APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "APK: $APK_PATH"
            echo "APK Size: $APK_SIZE"

            # Check if APK contains the Rust .so
            if unzip -l "$APK_PATH" | grep -q "libjarvis_rust.so"; then
              echo "✅ APK contains libjarvis_rust.so — Rust backend included!"
              unzip -l "$APK_PATH" | grep "libjarvis_rust.so"
            else
              echo "⚠️ APK does NOT contain libjarvis_rust.so — using CMake stub"
            fi

            # Check for JNI bridge stub
            if unzip -l "$APK_PATH" | grep -q "libjarvis_jni_bridge.so"; then
              echo "✅ APK contains libjarvis_jni_bridge.so"
            fi
          else
            echo "❌ No Release APK found!"
            exit 1
          fi

      # ── Step 13: Upload Release APK ───────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── Step 14: Build Debug APK ──────────────────────────────────
      - name: Build Debug APK
        if: always()
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee -a build.log || true
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      # ── Step 15: Upload Debug APK ─────────────────────────────────
      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── Step 16: Build logs ───────────────────────────────────────
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
          retention-days: 7

      # ── Step 17: Build summary ────────────────────────────────────
      - name: Build Summary
        if: always()
        run: |
          echo "══════════════════════════════════════════════════"
          echo "JARVIS APK Build Summary"
          echo "══════════════════════════════════════════════════"
          echo ""
          echo "Rust .so files:"
          find app/src/main/jniLibs -name "*.so" -exec ls -lh {} \; 2>/dev/null || echo "  None found"
          echo ""
          echo "Release APK:"
          find app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "  Not built"
          echo ""
          echo "Debug APK:"
          find app/build/outputs/apk/debug -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "  Not built"
          echo ""
          echo "══════════════════════════════════════════════════"
