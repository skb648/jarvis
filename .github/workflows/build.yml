name: Build Production APK

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -Dfile.encoding=UTF-8"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ═══════════════════════════════════════════════════════════════
      # 1. Checkout
      # ═══════════════════════════════════════════════════════════════
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ═══════════════════════════════════════════════════════════════
      # 2. Java 21 + Android SDK
      # ═══════════════════════════════════════════════════════════════
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ═══════════════════════════════════════════════════════════════
      # 3. Gradle cache (accelerates builds)
      # ═══════════════════════════════════════════════════════════════
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ═══════════════════════════════════════════════════════════════
      # 4. Setup Android SDK
      # ═══════════════════════════════════════════════════════════════
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ═══════════════════════════════════════════════════════════════
      # 5. Install NDK + CMake (required for JNI stub native library)
      # ═══════════════════════════════════════════════════════════════
      - name: Install Android NDK and CMake
        run: |
          sdkmanager "ndk;28.0.13004108" "cmake;3.22.1" "build-tools;35.0.0"
        shell: bash

      # ═══════════════════════════════════════════════════════════════
      # 6. Build Rust native library (BEST EFFORT — non-blocking)
      #    If this fails, the CMake stub still provides JNI stubs so
      #    the app loads and falls back to Kotlin HTTP mode.
      # ═══════════════════════════════════════════════════════════════
      - name: Build Rust shared libraries via cargo-ndk
        continue-on-error: true
        run: |
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.0.13004108
          cargo install cargo-ndk
          cd rust
          cargo ndk -t armeabi-v7a -t arm64-v8a -t x86 -t x86_64 -o ../app/src/main/jniLibs build --release
        shell: bash

      # ═══════════════════════════════════════════════════════════════
      # 7. Build debug APK (smoke test)
      # ═══════════════════════════════════════════════════════════════
      - name: Build Debug APK
        run: |
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.0.13004108
          ./gradlew :app:assembleDebug --stacktrace
        shell: bash

      # ═══════════════════════════════════════════════════════════════
      # 8. Build release APK (unsigned — for distribution)
      # ═══════════════════════════════════════════════════════════════
      - name: Build Release APK
        run: |
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.0.13004108
          ./gradlew :app:assembleRelease --stacktrace
        shell: bash

      # ═══════════════════════════════════════════════════════════════
      # 9. Upload artifacts
      # ═══════════════════════════════════════════════════════════════
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-apk-${{ github.run_number }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ═══════════════════════════════════════════════════════════════
      # 10. Summary
      # ═══════════════════════════════════════════════════════════════
      - name: Build Summary
        run: |
          echo "═══════════════════════════════════════════════════════"
          echo "  JARVIS BUILD COMPLETE"
          echo "═══════════════════════════════════════════════════════"
          ls -lh app/build/outputs/apk/debug/*.apk 2>/dev/null || echo "No debug APK"
          ls -lh app/build/outputs/apk/release/*.apk 2>/dev/null || echo "No release APK"
          echo "═══════════════════════════════════════════════════════"
