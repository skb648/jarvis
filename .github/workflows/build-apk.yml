name: Build JARVIS APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          echo "Installing Android NDK..."
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Add Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android
          rustup target add i686-linux-android

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: |
            rust/target
          key: rust-${{ hashFiles('rust/Cargo.toml', 'rust/src/**') }}
          restore-keys: rust-

      - name: Create jniLibs directories
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64
          mkdir -p app/src/main/jniLibs/x86

      - name: Build Rust native library (arm64-v8a)
        run: |
          cd rust
          cargo ndk -t aarch64-linux-android -o ../app/src/main/jniLibs --platform 26 build --release
          echo "arm64-v8a .so size:"
          ls -lh ../app/src/main/jniLibs/arm64-v8a/libjarvis_rust.so || echo "NOT FOUND"

      - name: Build Rust native library (armeabi-v7a)
        run: |
          cd rust
          cargo ndk -t armv7-linux-androideabi -o ../app/src/main/jniLibs --platform 26 build --release
          echo "armeabi-v7a .so size:"
          ls -lh ../app/src/main/jniLibs/armeabi-v7a/libjarvis_rust.so || echo "NOT FOUND"

      - name: Build Rust native library (x86_64)
        run: |
          cd rust
          cargo ndk -t x86_64-linux-android -o ../app/src/main/jniLibs --platform 26 build --release
          echo "x86_64 .so size:"
          ls -lh ../app/src/main/jniLibs/x86_64/libjarvis_rust.so || echo "NOT FOUND"

      - name: Build Rust native library (x86)
        run: |
          cd rust
          cargo ndk -t i686-linux-android -o ../app/src/main/jniLibs --platform 26 build --release
          echo "x86 .so size:"
          ls -lh ../app/src/main/jniLibs/x86/libjarvis_rust.so || echo "NOT FOUND"

      - name: Verify Rust .so files
        run: |
          echo "=== Rust JNI Libraries ==="
          find app/src/main/jniLibs -name "*.so" -exec ls -lh {} \;
          SO_COUNT=$(find app/src/main/jniLibs -name "*.so" | wc -l)
          echo "Total .so files: $SO_COUNT"
          if [ "$SO_COUNT" -lt 4 ]; then
            echo "WARNING: Not all ABI .so files were built! Continuing with stub fallback..."
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Verify APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
            APK_BYTES=$(stat -c%s "$APK_PATH" 2>/dev/null || stat -f%z "$APK_PATH" 2>/dev/null)
            echo "APK: $APK_PATH"
            echo "APK Size: $APK_SIZE"
            echo "APK Bytes: $APK_BYTES"
            # Check if APK is at least 50MB
            if [ "$APK_BYTES" -lt 52428800 ]; then
              echo "WARNING: APK is less than 50MB ($APK_SIZE). Consider adding more native libraries or resources."
            else
              echo "SUCCESS: APK is at least 50MB!"
            fi
          else
            echo "ERROR: No APK found!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee -a build.log
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
